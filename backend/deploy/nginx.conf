# ComplianceKit — nginx reverse proxy
#
# Place at /etc/nginx/sites-available/compliancekit and symlink into
# /etc/nginx/sites-enabled/. Certbot will inject the TLS bits on first run
# (`certbot --nginx -d api.compliancekit.com`) but the config below already
# anticipates the renewed paths.

# --- HTTP -> HTTPS redirect ---------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.compliancekit.com;

    # ACME challenge path for certbot renewals (served over plain HTTP).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS --------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.compliancekit.com;

    # TLS — populated/renewed by certbot.
    ssl_certificate     /etc/letsencrypt/live/api.compliancekit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.compliancekit.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.compliancekit.com/chain.pem;

    # Modern TLS defaults (Mozilla intermediate).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- Security headers ----------------------------------------------------
    # HSTS: 2 years, include subdomains, preload-ready.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions-Policy: deny all by default; frontend is on a different origin anyway.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # --- Request limits ------------------------------------------------------
    # 50M covers the largest realistic upload (multi-page PDF scan of a
    # full staff file). The Go handler will also enforce per-endpoint caps.
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 30s;
    send_timeout 60s;
    large_client_header_buffers 4 16k;

    # --- Compression ---------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # --- Logging -------------------------------------------------------------
    access_log /var/log/nginx/compliancekit.access.log;
    error_log  /var/log/nginx/compliancekit.error.log warn;

    # --- Health check --------------------------------------------------------
    # Lightweight endpoint for LB / uptime checks; does NOT hit the DB.
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }

    # --- Reverse proxy to Go backend ----------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Pass client info through.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket upgrade headers — not used today, here for future realtime.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts.
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Buffering off for streaming responses (e.g. large report downloads).
        proxy_buffering       on;
        proxy_request_buffering off;
    }
}

# Maps $http_upgrade -> $connection_upgrade for the WebSocket-ready proxy
# block above. Must be at http{} scope; leave this at the top of the file
# or move to /etc/nginx/conf.d/upgrade.conf.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
