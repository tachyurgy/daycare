version: "3.9"

# Local dev stack for ComplianceKit.
# SQLite lives in a named volume under /var/lib/compliancekit/ck.db (ADR-017).
# MinIO stands in for the four S3 buckets.

services:
  api:
    build: .
    container_name: ck_api
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/var/lib/compliancekit/ck.db
      AWS_ENDPOINT_URL_S3: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    ports:
      - "8080:8080"
    volumes:
      - ckdata:/var/lib/compliancekit
    depends_on:
      minio:
        condition: service_started

  minio:
    image: minio/minio:latest
    container_name: ck_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  ckdata:
  miniodata:
