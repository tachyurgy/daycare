# Build the Vite/React frontend and publish to gh-pages on every push to
# main that touches frontend/**. The repo uses a CNAME (compliancekit.com)
# pointing at GitHub Pages, so VITE_BASE_PATH is expected to be "" in prod;
# set it to "/<repo-name>/" only if the site is served from a subpath.
name: frontend-deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: write  # required by peaceiris/actions-gh-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Setup Node
        uses: actions/setup-node@v4.0.3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          # Empty string when served from a root CNAME; set in secrets
          # to e.g. "/daycare/" if deploying without a custom domain.
          VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH }}
        run: npm run build

      - name: Write CNAME
        # Publishing to a custom domain requires a CNAME file in the
        # published artifact. Skip if no custom domain is configured.
        if: vars.FRONTEND_CNAME != ''
        run: echo "${{ vars.FRONTEND_CNAME }}" > frontend/dist/CNAME

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "deploy: ${{ github.sha }}"
