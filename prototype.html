const TODAY = new Date("2026-04-13");
function daysUntil(dateStr) {
  const d = new Date(dateStr);
  return Math.round((d - TODAY) / 86400000);
}
function statusFor(days) {
  if (days < 0) return { label: "EXPIRED", color: "bg-red-100 text-red-700 border-red-200" };
  if (days <= 30) return { label: `${days}d left`, color: "bg-red-100 text-red-700 border-red-200" };
  if (days <= 60) return { label: `${days}d left`, color: "bg-amber-100 text-amber-700 border-amber-200" };
  if (days <= 90) return { label: `${days}d left`, color: "bg-yellow-100 text-yellow-700 border-yellow-200" };
  return { label: "OK", color: "bg-emerald-100 text-emerald-700 border-emerald-200" };
}

function StateBadge({ state }) {
  const colors = { FL: "bg-teal-100 text-teal-800", CA: "bg-sky-100 text-sky-800", TX: "bg-orange-100 text-orange-800" };
  return <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${colors[state]}`}>{state}</span>;
}

function DocPill({ date, label }) {
  if (date === "—" || date === "N/A") return <span className="text-xs text-slate-400">{label}: {date}</span>;
  const d = daysUntil(date);
  const s = statusFor(d);
  return (
    <span className={`inline-flex items-center gap-1 text-[11px] px-2 py-0.5 rounded border ${s.color}`}>
      <span className="font-medium">{label}</span>
      <span className="opacity-80">· {s.label}</span>
    </span>
  );
}

function ScoreRing({ value, size = 140 }) {
  const r = size / 2 - 10;
  const c = 2 * Math.PI * r;
  const offset = c - (value / 100) * c;
  const color = value >= 90 ? "#10b981" : value >= 75 ? "#f59e0b" : "#ef4444";
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} stroke="#e5e7eb" strokeWidth="10" fill="none" />
      <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth="10" fill="none"
        strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`} />
      <text x={size/2} y={size/2 + 8} textAnchor="middle" fontSize="28" fontWeight="700" fill="#0f172a">{value}</text>
      <text x={size/2} y={size/2 + 28} textAnchor="middle" fontSize="10" fill="#64748b">INSPECTION READY</text>
    </svg>
  );
}

            <h3 className="text-lg font-semibold">New Incident — generates {f.incident}</h3>
            <div className="space-y-3 mt-4 text-sm">
              <div><label className="block text-xs text-slate-500 mb-1">Child</label><select className="w-full border rounded px-2 py-1.5">{CHILDREN.map(c => <option key={c.id}>{c.name}</option>)}</select></div>
              <div className="grid grid-cols-2 gap-3">
                <div><label className="block text-xs text-slate-500 mb-1">Date</label><input type="date" className="w-full border rounded px-2 py-1.5" defaultValue="2026-04-13" /></div>
                <div><label className="block text-xs text-slate-500 mb-1">Time</label><input type="time" className="w-full border rounded px-2 py-1.5" /></div>
              </div>
              <div><label className="block text-xs text-slate-500 mb-1">Type</label>
                <select className="w-full border rounded px-2 py-1.5"><option>Fall / scrape</option><option>Bite</option><option>Allergic reaction</option><option>Illness onset</option><option>Injury requiring medical care</option></select></div>
              <div><label className="block text-xs text-slate-500 mb-1">What happened</label><textarea className="w-full border rounded px-2 py-1.5 h-20" placeholder="Narrative description for the parent and state record..."></textarea></div>
              <div><label className="block text-xs text-slate-500 mb-1">Action taken</label><textarea className="w-full border rounded px-2 py-1.5 h-20" placeholder="First aid given, parent notified, etc..."></textarea></div>
              <div className="flex gap-2 pt-2">
                <button onClick={() => setDrafting(false)} className="flex-1 py-2 border rounded-md">Cancel</button>
                <button onClick={() => setDrafting(false)} className="flex-1 py-2 bg-slate-900 text-white rounded-md">Save & send to parent for signature</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ========== FACILITY ========== */
function FacilityTab({ state }) {
  const f = FORMS[state];
  const items = [
    { label: f.plan, date: "2025-04-01", type: "PDF" },
    { label: f.insurance, date: "2026-01-15", type: "PDF" },
    { label: f.fire, date: "2025-06-20", type: "PDF" },
    { label: f.emergencyPlan, date: "2025-08-12", type: "PDF" },
    { label: "Floor plan / sketch", date: "2024-11-05", type: "PDF" },
    { label: "Staff roster (current)", date: "2026-04-01", type: "Live" },
    { label: "Weekly menu (posted)", date: "2026-04-12", type: "Posted" },
    { label: "Discipline policy", date: "2024-09-01", type: "PDF" },
    { label: "Safe sleep policy (staff-signed)", date: "2025-03-01", type: "PDF" },
    { label: "Transportation procedures", date: "2025-01-10", type: "PDF" },
  ];
  return (
    <div className="space-y-4">
      <h2 className="text-xl font-semibold">Facility File</h2>
      <div className="card p-5">
        <h3 className="font-semibold mb-4">{FACILITY.name}</h3>
        <div className="grid grid-cols-4 gap-6 text-sm">
          <div><div className="text-xs text-slate-500">License</div><div className="font-medium">{FACILITY.license}</div></div>
          <div><div className="text-xs text-slate-500">Expires</div><div className="font-medium">{FACILITY.licenseExpires}</div></div>
          <div><div className="text-xs text-slate-500">Capacity</div><div className="font-medium">{FACILITY.enrolled} / {FACILITY.capacity}</div></div>
          <div><div className="text-xs text-slate-500">Director</div><div className="font-medium">{FACILITY.director}</div></div>
        </div>
      </div>

      <div className="card p-5">
        <h3 className="font-semibold mb-3">Documents on File</h3>
        <div className="space-y-1">
          {items.map((it, i) => (
            <div key={i} className="flex items-center justify-between py-2 border-b last:border-b-0">
              <div>
                <div className="text-sm font-medium">{it.label}</div>
                <div className="text-xs text-slate-500">Last updated: {it.date} · {it.type}</div>
              </div>
              <div className="flex gap-2">
                <button className="text-xs px-2 py-1 rounded bg-slate-100">View</button>
                <button className="text-xs px-2 py-1 rounded bg-slate-100">Replace</button>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="card p-5">
        <h3 className="font-semibold mb-3">Posting Board — what's on the walls</h3>
        <div className="grid grid-cols-3 gap-2">
          {["Current license (entrance)","Room capacity (each room)","Evacuation plan (each room)","Weekly menu","Daily activity schedule","Discipline policy","Parent rights poster","Smoking prohibition","Emergency phone numbers","Allergy sheet per room"].map((p, i) => (
            <div key={i} className="text-xs px-3 py-2 rounded bg-emerald-50 border border-emerald-200 text-emerald-800 flex items-center justify-between">
              <span>{p}</span><span>✓</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ========== INSPECTION MODE ========== */
function InspectionMode({ state, onClose }) {
  const f = FORMS[state];
  const [step, setStep] = useState(0);
  const steps = ["Welcome", "Staff Sample", "Child Sample", "Facility Records", "Posted Items", "Drills & Walkthroughs", "Exit Conference"];
  return (
    <div className="space-y-4">
      <div className="bg-amber-50 border border-amber-300 rounded-lg p-4 flex justify-between items-center">
        <div>
          <div className="text-xs font-semibold uppercase tracking-wide text-amber-800">Inspector Mode Active</div>
          <div className="text-sm mt-1">Hand this iPad to the {f.inspectorAuthority}. Every tab below mirrors their <strong>{f.inspectorPrimary}</strong>.</div>
        </div>
        <button onClick={onClose} className="text-xs px-3 py-1.5 border border-amber-400 rounded">Exit inspection mode</button>
      </div>

      <div className="card">
        <div className="flex border-b overflow-x-auto scroll-hide">
          {steps.map((s, i) => (
            <button key={s} onClick={() => setStep(i)} className={`px-4 py-3 text-xs font-medium whitespace-nowrap border-b-2 ${step === i ? "border-slate-900 text-slate-900" : "border-transparent text-slate-500"}`}>
              {i + 1}. {s}
            </button>
          ))}
        </div>

        <div className="p-6">
          {step === 0 && (
            <div className="space-y-4">
              <h3 className="text-xl font-semibold">Welcome, Inspector.</h3>
              <div className="bg-slate-50 rounded-lg p-4 text-sm">
                <div><strong>Facility:</strong> {FACILITY.name}</div>
                <div><strong>License:</strong> {FACILITY.license}</div>
                <div><strong>Current enrollment:</strong> {FACILITY.enrolled} of {FACILITY.capacity} capacity</div>
                <div><strong>Staff on-site today:</strong> 7 of 7 (all ratios current — see Rooms tab)</div>
                <div><strong>Today's walkthrough:</strong> ✓ completed by MO at 6:52am</div>
                <div><strong>Last visit:</strong> 2026-01-22 · 0 findings</div>
              </div>
              <p className="text-sm text-slate-600">Everything on your <strong>{f.inspectorPrimary}</strong> maps to a tab here. Tap any line item to see the source document.</p>
              <div className="grid grid-cols-2 gap-3 text-sm">
                <div className="card p-4"><div className="text-xs text-slate-500">Child files clean</div><div className="text-2xl font-bold">7 / 8</div></div>
                <div className="card p-4"><div className="text-xs text-slate-500">Staff files clean</div><div className="text-2xl font-bold">5 / 7</div></div>
                <div className="card p-4"><div className="text-xs text-slate-500">Drills (last 12 mo)</div><div className="text-2xl font-bold">12 / 12 fire · 4 / 4 lockdown</div></div>
                <div className="card p-4"><div className="text-xs text-slate-500">Open incidents</div><div className="text-2xl font-bold">0</div></div>
              </div>
            </div>
          )}
          {step === 1 && (
            <div>
              <h3 className="text-lg font-semibold mb-3">Pull any three staff files</h3>
              <p className="text-sm text-slate-600 mb-4">Click a row. Every line on <strong>{state === "TX" ? "Form 7259" : state === "FL" ? "CF-FSP 5316 §25–28" : "LIC 311A §II"}</strong> is covered.</p>
              <table className="w-full text-sm">
                <thead className="bg-slate-50 text-xs uppercase">
                  <tr><th className="text-left px-3 py-2">Name</th><th className="text-left">BG Check</th><th className="text-left">CPR</th><th className="text-left">Physical</th><th className="text-left">Training</th><th className="text-left">Mandated Reporter</th></tr>
                </thead>
                <tbody>
                  {STAFF.map(s => (
                    <tr key={s.id} className="border-t">
                      <td className="px-3 py-2 font-medium">{s.name}<div className="text-[10px] text-slate-500">{s.role}</div></td>
                      <td><DocPill date={s.docs.staffBG} label="" /></td>
                      <td><DocPill date={s.docs.staffCPR} label="" /></td>
                      <td><DocPill date={s.docs.staffPhysical} label="" /></td>
                      <td><DocPill date={s.docs.staffInservice} label="" /></td>
                      <td><DocPill date={s.docs.staffReporter} label="" /></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          {step === 2 && (
            <div>
              <h3 className="text-lg font-semibold mb-3">Pull any child file</h3>
              <p className="text-sm text-slate-600 mb-4">Covers <strong>{state === "TX" ? "Form 7260" : state === "FL" ? "CF-FSP 5316 §29–30" : "LIC 311A §I"}</strong>.</p>
              <table className="w-full text-sm">
                <thead className="bg-slate-50 text-xs uppercase">
                  <tr><th className="text-left px-3 py-2">Child</th><th className="text-left">Enrollment</th><th className="text-left">Emergency</th><th className="text-left">Immunization</th><th className="text-left">Medical Consent</th><th className="text-left">Allergies</th></tr>
                </thead>
                <tbody>
                  {CHILDREN.map(c => (
                    <tr key={c.id} className="border-t">
                      <td className="px-3 py-2 font-medium">{c.name}<div className="text-[10px] text-slate-500">{c.ageLabel} · {c.room}</div></td>
                      <td><DocPill date={c.docs.enrollment} label="" /></td>
                      <td><DocPill date={c.docs.emergency} label="" /></td>
                      <td><DocPill date={c.docs.immunization} label="" /></td>
                      <td><DocPill date={c.docs.medical} label="" /></td>
                      <td className="text-xs">{c.allergies.length > 0 ? <span className="text-red-600 font-semibold">⚠ {c.allergies.join(", ")}</span> : <span className="text-slate-400">none</span>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          {step === 3 && (
            <div>
              <h3 className="text-lg font-semibold mb-3">Facility Records</h3>
              <p className="text-sm text-slate-600 mb-4">Covers <strong>{state === "TX" ? "Form 7261" : state === "FL" ? "CF-FSP §32" : "LIC 311A §III"}</strong>.</p>
              <div className="grid grid-cols-2 gap-3">
                {[f.plan, f.insurance, f.fire, f.emergencyPlan, "Floor plan", "Staff roster", "Discipline policy", "Safe sleep policy", "Transportation plan", "Last 3 inspection reports"].map((x, i) => (
                  <div key={i} className="border rounded-md p-3 flex justify-between items-center text-sm">
                    <span>{x}</span>
                    <span className="text-xs text-emerald-600 font-semibold">✓ Current</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {step === 4 && (
            <div>
              <h3 className="text-lg font-semibold mb-3">Posted Items — live photo grid</h3>
              <p className="text-sm text-slate-600 mb-4">We photograph each posting weekly, date-stamped. Inspector can scroll and verify.</p>
              <div className="grid grid-cols-3 gap-3">
                {["License","Menu","Activity schedule","Evacuation plan","Room capacity","Parent rights","Discipline policy","Smoking prohibited","Allergy sheet"].map((p, i) => (
                  <div key={i} className="border rounded-md overflow-hidden">
                    <div className="h-28 bg-gradient-to-br from-slate-200 to-slate-300 flex items-center justify-center text-slate-500 text-xs">📷 {p}</div>
                    <div className="px-3 py-2 text-xs">
                      <div className="font-medium">{p}</div>
                      <div className="text-slate-500">Verified 2026-04-08</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {step === 5 && (
            <div>
              <h3 className="text-lg font-semibold mb-3">Drills & Daily Walkthrough — 12 months</h3>
              <div className="grid grid-cols-4 gap-3 mb-4">
                <div className="card p-4"><div className="text-xs text-slate-500">Fire drills</div><div className="text-2xl font-bold">12/12</div></div>
                <div className="card p-4"><div className="text-xs text-slate-500">Lockdown drills</div><div className="text-2xl font-bold">4/4</div></div>
                <div className="card p-4"><div className="text-xs text-slate-500">Severe weather</div><div className="text-2xl font-bold">4/4</div></div>
                <div className="card p-4"><div className="text-xs text-slate-500">Walkthroughs</div><div className="text-2xl font-bold">365/365</div></div>
              </div>
              <div className="space-y-2">
                {DRILLS.map((d, i) => (
                  <div key={i} className="flex justify-between text-sm border-b py-2">
                    <span className="font-medium">{d.type}</span>
                    <span>{d.date}</span>
                    <span className="text-slate-500">{d.duration !== "—" ? `${d.duration}` : "—"}</span>
                    <span className="text-emerald-600">✓ passed</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {step === 6 && (
            <div>
              <h3 className="text-lg font-semibold mb-3">Exit Conference Summary</h3>
              <div className="bg-emerald-50 border border-emerald-300 rounded-lg p-5">
                <div className="text-xs uppercase text-emerald-700 font-bold">Findings today</div>
                <div className="text-3xl font-bold mt-1">0 violations</div>
                <div className="text-sm mt-2 text-emerald-800">Inspector signed off at {new Date().toLocaleTimeString()}.</div>
              </div>
              <div className="mt-4 space-y-2 text-sm">
                <div className="flex justify-between border-b py-2"><span>Inspection scope</span><span>Routine monitoring</span></div>
                <div className="flex justify-between border-b py-2"><span>Duration</span><span>52 min</span></div>
                <div className="flex justify-between border-b py-2"><span>Records sampled</span><span>3 staff, 5 children</span></div>
                <div className="flex justify-between border-b py-2"><span>Ratio checks</span><span>5/5 rooms clean</span></div>
                <div className="flex justify-between border-b py-2"><span>Posted items verified</span><span>9/9</span></div>
                <div className="flex justify-between border-b py-2"><span>Inspector signature</span><span className="italic text-slate-500">[e-signature captured]</span></div>
              </div>
              <button className="mt-6 w-full py-2.5 bg-slate-900 text-white rounded-md font-medium">Email exit report to director + inspector</button>
            </div>
          )}
        </div>

        <div className="border-t p-4 flex justify-between">
          <button onClick={() => setStep(Math.max(0, step - 1))} className="px-4 py-2 text-sm border rounded-md" disabled={step === 0}>← Previous</button>
          <button onClick={() => setStep(Math.min(steps.length - 1, step + 1))} className="px-4 py-2 text-sm bg-slate-900 text-white rounded-md" disabled={step === steps.length - 1}>Next →</button>
        </div>
      </div>
    </div>
  );
}

/* ==================== APP ROOT ==================== */
function App() {
  const [state, setState] = useState("FL");
  const [tab, setTab] = useState("dashboard");
  const [inspectorMode, setInspectorMode] = useState(false);
  const [openChild, setOpenChild] = useState(null);
  const [openStaff, setOpenStaff] = useState(null);

  return (
    <div className="min-h-screen">
      <TopBar state={state} setState={setState} tab={tab} setTab={setTab} inspectorMode={inspectorMode} setInspectorMode={setInspectorMode} />
      <div className="max-w-[1400px] mx-auto px-6 py-6">
        {tab === "dashboard" && <Dashboard state={state} setTab={setTab} />}
        {tab === "children" && <ChildrenTab state={state} onOpen={setOpenChild} />}
        {tab === "staff" && <StaffTab state={state} onOpen={setOpenStaff} />}
        {tab === "rooms" && <RoomsTab state={state} />}
        {tab === "drills" && <DrillsTab state={state} />}
        {tab === "incidents" && <IncidentsTab state={state} />}
        {tab === "facility" && <FacilityTab state={state} />}
        {tab === "inspection" && <InspectionMode state={state} onClose={() => setTab("dashboard")} />}
      </div>
      {openChild && <ChildDetail id={openChild} state={state} onClose={() => setOpenChild(null)} />}
      {openStaff && <StaffDetail id={openStaff} state={state} onClose={() => setOpenStaff(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
